<!-- Custom head includes for A.I. NXTGEN Studio -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "/css/dark-mode.css" | relative_url }}">

<!-- Favicon: AI Brain icon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">

<style>
  /* Font family override */
  body, html {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
  }
  
  /* Hero animated background for homepage */
  .hero.is-large .hero-body {
    position: relative;
    overflow: hidden;
  }
  
  /* Animated gradient background */
  .hero-animated-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #0d0d14 0%, #1a1a2e 50%, #16213e 100%);
    z-index: 0;
  }
  
  /* Animated particles/neural network effect */
  .hero-animated-bg::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(2px 2px at 20px 30px, #6c5ce7, transparent),
      radial-gradient(2px 2px at 40px 70px, #a29bfe, transparent),
      radial-gradient(1px 1px at 90px 40px, #fff, transparent),
      radial-gradient(2px 2px at 130px 80px, #6c5ce7, transparent),
      radial-gradient(1px 1px at 160px 120px, #fff, transparent),
      radial-gradient(2px 2px at 200px 50px, #a29bfe, transparent),
      radial-gradient(1px 1px at 250px 160px, #6c5ce7, transparent),
      radial-gradient(2px 2px at 300px 90px, #fff, transparent);
    background-size: 350px 200px;
    animation: starFloat 60s linear infinite;
    opacity: 0.4;
  }
  
  @keyframes starFloat {
    from { transform: translateY(0) translateX(0); }
    to { transform: translateY(-200px) translateX(50px); }
  }
  
  /* Grid lines overlay */
  .hero-animated-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  
  .hero-body > .container {
    position: relative;
    z-index: 1;
  }
  
  /* Glowing accent on titles */
  .title.is-1, .title.is-2 {
    text-shadow: 0 0 40px rgba(108, 92, 231, 0.3);
  }
  
  /* Neon border on cards */
  .neon-card {
    border: 1px solid rgba(108, 92, 231, 0.3);
    box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
    transition: all 0.3s ease;
  }
  
  .neon-card:hover {
    border-color: rgba(108, 92, 231, 0.6);
    box-shadow: 0 0 30px rgba(108, 92, 231, 0.2);
  }
  
  /* Status indicator pulse */
  .status-pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: #00d26a;
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0, 210, 106, 0.4); }
    70% { box-shadow: 0 0 0 8px rgba(0, 210, 106, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 210, 106, 0); }
  }
  
  /* Dark scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: #0d0d14;
  }
  ::-webkit-scrollbar-thumb {
    background: #2d2d44;
    border-radius: 3px;
  }
</style>
