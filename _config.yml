# Site Settings
lang: en
title: A.I. NXTGEN Studio
tagline: Exploring the Future of AI, Robotics, XR, and Emerging Technologies
email: contact@ainxtgen.xyz
description: >
  A.I. NXTGEN Studio — A multidisciplinary research laboratory at the frontier of AI, 
  robotics, brain-computer interfaces, extended reality, and sustainable energy.
baseurl: ""
url: "https://ainxtgen.github.io"
permalink: pretty

# Disable remote theme - using custom layouts
# remote_theme: chrisrhymes/bulma-clean-theme

# Paginate
paginate: 5
paginate_path: "/blog/page:num"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - kramdown-parser-gfm

# Exclude
exclude:
  - Gemfile
  - clean-theme.gemspec
  - Gemfile.lock
  - node_modules
  - vendor/

# Sass
sass:
  style: compressed
  source_dir: _sass

# Defaults
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: page
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: page

# Markdown
markdown: kramdown
highlighter: rouge
